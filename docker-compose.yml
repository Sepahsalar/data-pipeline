x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile

  depends_on:
    postgres:
      condition: service_healthy

  environment:
    AIRFLOW_HOME: /opt/airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    PYTHONPATH: /opt/airflow/project
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
  
  volumes:
    - .:/opt/airflow/project
    - ./airflow/logs:/opt/airflow/logs
    - ~/.aws:/home/airflow/.aws:ro
    - ~/.snowflake:/home/airflow/.snowflake:ro

services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow scheduler

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully

    command: airflow webserver

    ports:
      - "8080:8080"
  
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
  
  etl:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app
      - ~/.aws:/root/.aws:ro
      - ~/.snowflake:/root/.snowflake:ro

    command: ["python", "run_pipeline.py"]

volumes:
  postgres-data: