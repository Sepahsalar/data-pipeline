version: 2

models:
  - name: stg_users
    description: "Cleans and prepares raw user data for downstream models."

    columns:
      - name: id
        description: "Unique user identifier."

      - name: name
        description: "User name."

      - name: age
        description: "User age."

      - name: age_group
        description: "Categorized age group."

      - name: load_date
        description: "Timestamp of ingestion."